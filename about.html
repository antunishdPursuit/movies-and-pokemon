<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Movies and Pokemon</title>
        <meta name="description" content="Search movies with the OMDb API in this vanilla JavaScript playground.">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
        <link rel="stylesheet" href="style.css">
        <link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
        <link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
        <link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
        <link rel="manifest" href="favicon_io/site.webmanifest">
    </head>
<body id="movieBackground" class="movie-page">
    <header class="site-header">
        <img class="site-header-art" src="programming.gif" alt="">
        <div class="site-header-center">
            <a class="site-brand" href="index.html">Movies and Pokemon</a>
            <nav class="site-nav" aria-label="Primary navigation">
                <a href="index.html">Pokemon Battle</a>
                <a href="about.html" aria-current="page">Movie Search</a>
            </nav>
        </div>
        <img class="site-header-art" src="programming2.gif" alt="">
    </header>
    <main class="container movie-main">
        <h1 class="movie-page-title">Find a movie to watch</h1>
        <div class="row">
            <aside class="col-md-3 movie-search-panel" id="leftSideBox" aria-labelledby="movie-search-title">
                <h2 id="movie-search-title">Movie Search</h2>
                <form class="movie-search-form" id="movieForm">
                    <div class="movie-field">
                        <label for="movie">Movie title</label>
                        <input required id="movie" name="movie" type="search" placeholder="e.g., The Matrix" aria-describedby="movieSearchHelp">
                    </div>
                    <div class="movie-field">
                        <label for="movieYear">Release year <span>(optional)</span></label>
                        <input id="movieYear" name="movieYear" type="number" min="1888" max="2100" placeholder="e.g., 1999">
                    </div>
                    <button id="movieSubmt" type="submit">Search movies</button>
                </form>
                <p class="movie-search-help" id="movieSearchHelp">Spaces and punctuation are allowed.</p>
                <p class="movie-search-status" id="movieStatus" role="status" aria-live="polite">Enter a movie title to begin.</p>
            </aside>
            <aside class="col">
                <div class="row" id="movieBox">
                </div>
            </aside>
        </div>
    </main>        
    <footer class="site-footer" id="siteFooterBackground">
        <img class="site-footer-art" src="programming3.gif" alt="">
        <p>Movies and Pokemon</p>
        <div>
            <a href="https://github.com/antunishdPursuit" target="_blank" rel="noopener noreferrer">GitHub</a>
            <a href="https://www.linkedin.com/in/dennys-antunish/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
        </div>
    </footer>
    <script type="module" src="movie.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
